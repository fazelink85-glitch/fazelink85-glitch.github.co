<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>OdysseySMP · snow dots</title>
  <style>
    /* ------- global reset & full‑page fit ------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;            /* no scrolling, everything fits viewport */
      background-color: #4a4a4a;  /* fallback gray background */
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* full‑page flex container */
    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;              /* exactly viewport height */
      max-width: 100%;
      margin: 0 auto;
    }

    /* ---------- TOP BAR (gray, no blur) ---------- */
    .topbar {
      width: 100%;
      background: #3a3a4a;        /* medium gray with slight cool tone */
      background: linear-gradient(180deg, #4b4b5a 0%, #353545 100%);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 20;
      min-height: 70px;
      flex-shrink: 0;             /* never shrink bar */
    }

    /* server title – left side, blue text */
    .server-title {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: 1.2px;
      color: #3b82f6;             /* vibrant blue */
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      text-shadow: 0 0 12px rgba(59,130,246,0.5);
      margin-right: auto;         /* push to left */
      white-space: nowrap;
      line-height: 1.2;
    }

    /* Discord button – right side, real link */
    .discord-btn {
      background: #5865F2;
      background: linear-gradient(135deg, #5865F2 0%, #4752c4 100%);
      color: white;
      border: none;
      padding: 0.6rem 1.9rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 12px rgba(88, 101, 242, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-decoration: none;
      line-height: 1.2;
      white-space: nowrap;
      margin-left: auto;          /* push to right side */
    }

    .discord-btn:hover {
      background: #6d75f5;
      box-shadow: 0 8px 18px rgba(88, 101, 242, 0.65);
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .discord-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(88, 101, 242, 0.5);
    }

    /* discord icon */
    .discord-icon {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: white;
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20.317 4.37a19.8 19.8 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>') center/contain no-repeat;

    }

    /* ---------- snow stage with video background ---------- */
    .snow-stage {
      flex: 1 1 auto;             /* take all available height below top bar */
      width: 100%;
      position: relative;
      overflow: hidden;
      background: transparent;
      min-height: 0;              /* allow flex shrink */
    }

    /* Video background wrapper with blur */
    .video-background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    /* The actual video */
    #bgVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(6px);          /* blur effect on the video */
      transform: scale(1.1);      /* slightly scale up to hide blur edges */
    }

    /* Dark overlay to make text more readable */
    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);  /* dark tint */
      z-index: 1;
    }

    #snowCanvas {
      display: block;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ---------- center info box ---------- */
    .info-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 20, 30, 0.8);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      padding: 1.8rem 2.4rem;
      min-width: 280px;
      max-width: 520px;
      width: fit-content;
      text-align: left;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.3px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.55), 0 0 45px rgba(59, 130, 246, 0.25);
      z-index: 10;
      pointer-events: auto;
      transition: all 0.3s ease;
    }

    .info-box:hover {
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.65), 0 0 55px rgba(59, 130, 246, 0.35);
    }

    .info-box ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .info-box ul li {
      padding: 0.45rem 0;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .info-box ul li:last-child {
      border-bottom: none;
      font-weight: 600;
      color: #a5d8ff;
      padding-top: 0.6rem;
    }

    .info-box ul li::before {
      content: "•";
      color: #3b82f6;
      font-weight: bold;
      font-size: 1.3rem;
      line-height: 1;
      flex-shrink: 0;
    }

    /* bottom quote */
    .footer-quote {
      position: absolute;
      bottom: 1.2rem;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 500;
      letter-spacing: 0.6px;
      font-style: italic;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7), 0 0 20px rgba(59, 130, 246, 0.5);
      background: transparent;
      backdrop-filter: blur(3px);
      padding: 0.5rem 1.5rem;
      pointer-events: none;
      z-index: 5;
      line-height: 1.4;
    }

    /* responsive adjustments */
    @media (max-width: 600px) {
      .topbar {
        padding: 0 1.2rem;
      }
      .server-title {
        font-size: 1.8rem;
        white-space: normal;
        line-height: 1.2;
      }
      .discord-btn {
        padding: 0.5rem 1.4rem;
        font-size: 1rem;
      }
      .footer-quote {
        bottom: 0.8rem;
        font-size: 1rem;
      }
      .info-box {
        padding: 1.3rem 1.6rem;
        min-width: 240px;
        font-size: 0.95rem;
      }
      #bgVideo {
        filter: blur(4px);        /* slightly less blur on mobile */
      }
    }
  </style>
</head>
<body>
<div class="page">
  <!-- top bar: gray, text left, discord button right (real link) -->
  <header class="topbar">
    <h1 class="server-title">OdysseySMP</h1>
    <a href="https://discord.gg/BtvUe8ysZP" target="_blank" rel="noopener noreferrer" class="discord-btn" aria-label="Join Discord">
      <span class="discord-icon"></span> Discord
    </a>
  </header>

  <!-- snow fills exactly the rest of the viewport, with blurred video background -->
  <div class="snow-stage">
    <!-- Video background with blur -->
    <div class="video-background">
      <video autoplay muted loop playsinline id="bgVideo">
        <source src="replay.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
      <div class="video-overlay"></div>
    </div>
    
    <canvas id="snowCanvas" aria-hidden="true"></canvas>
    
    <!-- center info box with all five points -->
    <div class="info-box" id="infoBox">
      <ul>
        <li>We are a scripted SMP</li>
        <li>We are in need of members</li>
        <li>You can become a trusted member and more to be in more events</li>
        <li>We are saving up for buying a server (for now we are using a free server)</li>
        <li>Please join</li>
      </ul>
    </div>
    
    <div class="footer-quote">Trust isn't made, its forced...-Lezy</div>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('snowCanvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    const PARTICLE_COUNT = 135;
    
    let canvasWidth, canvasHeight;
    let animationFrame;

    // ----- canvas sizing -----
    function resizeCanvas() {
      const container = canvas.parentElement; // .snow-stage
      if (!container) return;
      
      const newWidth = container.clientWidth;
      const newHeight = container.clientHeight;
      
      if (newWidth === 0 || newHeight === 0) return;
      
      canvasWidth = newWidth;
      canvasHeight = newHeight;
      canvas.width = canvasWidth;
      canvas.height = canvasHeight;
      
      // reinitialize particles to match new dimensions
      initParticles();
    }

    function createParticle() {
      return {
        x: Math.random() * (canvasWidth || 300),
        y: Math.random() * (canvasHeight || 400),
        radius: 1.3 + Math.random() * 2.2,
        speedY: 0.45 + Math.random() * 1.3,
        speedX: (Math.random() - 0.5) * 0.75,
        opacity: 0.65 + Math.random() * 0.35,
      };
    }

    function initParticles() {
      if (!canvasWidth || !canvasHeight) return;
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(createParticle());
      }
    }

    // update snow positions – wrap around edges
    function updateParticles() {
      for (let p of particles) {
        p.y += p.speedY;
        p.x += p.speedX + (Math.random() - 0.5) * 0.2;
        
        // vertical wrap: if below bottom, reappear at top
        if (p.y > canvasHeight + p.radius) {
          p.y = -p.radius;
          p.x = Math.random() * canvasWidth;
        }
        // if above top (rare), wrap to bottom
        if (p.y < -p.radius) {
          p.y = canvasHeight + p.radius;
          p.x = Math.random() * canvasWidth;
        }
        
        // horizontal wrap
        if (p.x > canvasWidth + p.radius) {
          p.x = -p.radius;
        } else if (p.x < -p.radius) {
          p.x = canvasWidth + p.radius;
        }
      }
    }

    function drawSnow() {
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);
      
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
        ctx.fill();
        
        // subtle glow on larger dots
        if (p.radius > 2.4) {
          ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
          ctx.shadowBlur = 6;
          ctx.fill();
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
        }
      }
    }

    function animate() {
      if (!canvasWidth || !canvasHeight) {
        resizeCanvas();
      }
      updateParticles();
      drawSnow();
      animationFrame = requestAnimationFrame(animate);
    }

    function startSnow() {
      resizeCanvas();
      if (animationFrame) cancelAnimationFrame(animationFrame);
      animate();
    }

    // ----- resize handling -----
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        resizeCanvas();
      }, 80);
    });

    // observe container size changes (more robust)
    if (window.ResizeObserver) {
      const stage = document.querySelector('.snow-stage');
      if (stage) {
        const observer = new ResizeObserver(() => {
          resizeCanvas();
        });
        observer.observe(stage);
      }
    }

    // start everything
    startSnow();

    // cleanup animation on page unload
    window.addEventListener('beforeunload', () => {
      if (animationFrame) cancelAnimationFrame(animationFrame);
    });
  })();
</script>
</body>
</html>
